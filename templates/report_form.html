{% extends "base.html" %}

{% block content %}
<div class="container form-container">
    <div class="glass-panel">
        <div class="page-header">
            <div>
                <h2><i class='bx bx-file-blank'></i> Submit Disease Report</h2>
                <p>Log a new epidemiological incident into the system.</p>
            </div>
            <a href="{{ url_for('main.dashboard') }}" class="btn btn-outline btn-sm">Cancel</a>
        </div>
        
        <form method="POST" action="{{ url_for('main.new_report') }}">
            <div class="form-row">
                <div class="form-group col-md-8">
                    <label>Patient ID / Name (Optional Alias)</label>
                    <input type="text" name="patient_name" required placeholder="e.g. Patient Alpha">
                </div>
                <div class="form-group col-md-4">
                    <label>Age</label>
                    <input type="number" name="age" required min="0" max="120">
                </div>
            </div>
            
            <div class="form-row">
                <div class="form-group col-md-6">
                    <label>Disease Classification</label>
                    <select name="disease" required>
                        <option value="">Select Disease...</option>
                        {% for d in diseases %}
                            <option value="{{ d.name }}">{{ d.name }} ({{ d.category|title }})</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group col-md-6">
                    <label>Severity Level</label>
                    <select name="severity" required>
                        <option value="mild">Mild - Outpatient</option>
                        <option value="moderate">Moderate - Monitoring required</option>
                        <option value="severe">Severe - Hospitalized</option>
                        <option value="critical">Critical - ICU</option>
                    </select>
                </div>
            </div>
            
            <div class="form-group">
                <label>Observed Symptoms</label>
                <textarea name="symptoms" rows="3" required placeholder="Comma-separated symptoms..."></textarea>
            </div>
            
            <fieldset class="form-fieldset">
                <legend>Geographic Origin</legend>
                <div class="form-row">
                    <div class="form-group col-md-6">
                        <label>City / Municipality</label>
                        <input type="text" name="location_city" required>
                    </div>
                    <div class="form-group col-md-6">
                        <label>State / Province</label>
                        <input type="text" name="location_state" required>
                    </div>
                </div>
            </fieldset>
            
            <div class="form-actions mt-4">
                <button type="submit" class="btn btn-primary btn-lg"><i class='bx bx-send'></i> Submit Incident</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
