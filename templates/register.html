{% extends "base.html" %}

{% block content %}
<div class="auth-wrapper container">
    <div class="auth-card glass-panel" style="max-width: 500px;">
        <div class="auth-header">
            <i class='bx bx-building-house'></i>
            <h2>Network Registration</h2>
            <p>Join the epidemiological task force</p>
        </div>
        
        <form method="POST" class="auth-form">
            <div class="form-group">
                <label for="username">Operator Handler</label>
                <div class="input-icon">
                    <i class='bx bx-user'></i>
                    <input type="text" id="username" name="username" value="{{ form_data.get('username', '') }}" required>
                </div>
            </div>
            
            <div class="form-group">
                <label for="email">Official Email</label>
                <div class="input-icon">
                    <i class='bx bx-envelope'></i>
                    <input type="email" id="email" name="email" value="{{ form_data.get('email', '') }}" required>
                </div>
            </div>
            
            <div class="form-group">
                <label for="password">Passphrase</label>
                <div class="input-icon">
                    <i class='bx bx-lock-alt'></i>
                    <input type="password" id="password" name="password" required>
                </div>
            </div>
            
            <div class="form-group">
                <label for="confirm_password">Confirm Passphrase</label>
                <div class="input-icon">
                    <i class='bx bx-lock-alt'></i>
                    <input type="password" id="confirm_password" name="confirm_password" required>
                </div>
            </div>
            
            <button type="submit" class="btn btn-primary btn-block">Submit Registration</button>
        </form>
        
        <div class="auth-footer">
            <p>Already an operator? <a href="{{ url_for('auth.login') }}">Authenticate here</a></p>
        </div>
    </div>
</div>
{% endblock %}
