{% extends "base.html" %}

{% block content %}
<div class="auth-wrapper container">
    <div class="auth-card glass-panel">
        <div class="auth-header">
            <i class='bx bx-fingerprint' ></i>
            <h2>Secure Authentication</h2>
            <p>Access the surveillance network</p>
        </div>
        
        <form method="POST" class="auth-form">
            <div class="form-group">
                <label for="username">Operator Handler</label>
                <div class="input-icon">
                    <i class='bx bx-user'></i>
                    <input type="text" id="username" name="username" required autocomplete="username" autofocus>
                </div>
            </div>
            
            <div class="form-group">
                <label for="password">Passphrase</label>
                <div class="input-icon">
                    <i class='bx bx-lock-alt'></i>
                    <input type="password" id="password" name="password" required>
                </div>
            </div>
            
            <div class="form-check">
                <input type="checkbox" id="remember" name="remember">
                <label for="remember">Maintain persistent connection</label>
            </div>
            
            <button type="submit" class="btn btn-primary btn-block">Authenticate</button>
        </form>
        
        <div class="auth-footer">
            <p>Not authorized yet? <a href="{{ url_for('auth.register') }}">Request access</a></p>
        </div>
    </div>
</div>
{% endblock %}
